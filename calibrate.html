<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale Calibrator</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14161a;
        --panel: #1c1f25;
        --border: #2c3038;
        --accent: #4da3ff;
        --text: #e8eaed;
        --text-dim: #9aa0a8;
        --good: #4caf80;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
      }
      #app {
        display: flex; height: 100vh; width: 100vw; overflow: hidden;
      }
      #viewport {
        flex: 1 1 auto; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0b0c0e; position: relative; min-width: 0;
      }
      #render-canvas {
        max-width: 100%; max-height: calc(100vh - 110px);
        width: auto; height: auto; display: block;
        box-shadow: 0 0 0 1px var(--border);
      }
      #viewport-toolbar {
        position: absolute; top: 12px; left: 12px; right: 12px;
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        pointer-events: none;
      }
      #viewport-toolbar > * { pointer-events: auto; }
      #status-line {
        position: absolute; bottom: 10px; left: 12px; right: 12px;
        font-size: 12px; color: var(--text-dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      #active-title {
        background: rgba(20,22,26,0.85); border: 1px solid var(--border);
        border-radius: 8px; padding: 6px 12px; font-weight: 600;
      }
      #panel {
        width: 420px; flex: 0 0 420px; background: var(--panel);
        border-left: 1px solid var(--border);
        display: flex; flex-direction: column; min-width: 0;
      }
      #panel-header {
        padding: 14px 16px; border-bottom: 1px solid var(--border);
      }
      #panel-header h1 { font-size: 15px; margin: 0 0 10px; }
      .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
      .row label { width: 90px; flex: 0 0 90px; color: var(--text-dim); font-size: 12px; }
      select, input[type="number"], button {
        background: #262a31; color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 6px 8px; font-size: 13px;
      }
      select { flex: 1; }
      button {
        cursor: pointer; transition: background 0.15s;
      }
      button:hover { background: #31363f; }
      button.primary { background: var(--accent); color: #06121f; border-color: var(--accent); font-weight: 700; }
      button.primary:hover { background: #6bb4ff; }
      #big-controls {
        padding: 12px 16px; border-bottom: 1px solid var(--border);
      }
      #big-controls .slider-row { display: flex; align-items: center; gap: 10px; }
      #height-slider { flex: 1; }
      #height-value { width: 76px; text-align: right; }
      #nav-row { display: flex; gap: 8px; margin-top: 10px; }
      #nav-row button { flex: 1; }
      #rotate-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--text-dim); }
      #rotate-row input[type="range"] { flex: 1; }
      #save-row { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
      #save-row button { flex: 1; }
      #save-status { font-size: 12px; color: var(--good); padding: 0 16px; min-height: 16px; }
      #list-wrap { flex: 1 1 auto; overflow-y: auto; }
      .class-group-title {
        position: sticky; top: 0; background: #171a1f; color: var(--text-dim);
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
        padding: 8px 16px 4px; border-bottom: 1px solid var(--border);
      }
      .model-item {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 16px; border-bottom: 1px solid #22262d; cursor: pointer;
      }
      .model-item:hover { background: #21252c; }
      .model-item.active { background: #1c2b3f; border-left: 3px solid var(--accent); padding-left: 13px; }
      .model-item .name {
        flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: 12.5px;
      }
      .model-item .name small { display: block; color: var(--text-dim); font-size: 10.5px; }
      .model-item .mini-height {
        width: 64px; text-align: right; font-size: 12px; color: var(--text-dim);
      }
      .model-item.calibrated .mini-height { color: var(--good); }
      .model-item .status-dot {
        width: 7px; height: 7px; border-radius: 50%; background: #444; flex: 0 0 7px;
      }
      .model-item.calibrated .status-dot { background: var(--good); }
      #loading-overlay {
        position: absolute; inset: 0; background: rgba(11,12,14,0.92);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 10px; z-index: 10;
      }
      #loading-overlay .bar-track {
        width: 320px; height: 6px; background: #262a31; border-radius: 3px; overflow: hidden;
      }
      #loading-overlay .bar-fill {
        height: 100%; width: 0%; background: var(--accent); transition: width 0.15s;
      }
      #loading-overlay .loading-label { font-size: 13px; color: var(--text-dim); text-align: center; max-width: 420px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport">
        <div id="loading-overlay">
          <div class="loading-label" id="loading-label">Booting scene…</div>
          <div class="bar-track"><div class="bar-fill" id="loading-bar"></div></div>
        </div>
        <div id="viewport-toolbar">
          <div id="active-title">Select a model &rarr;</div>
        </div>
        <canvas id="render-canvas"></canvas>
        <div id="status-line"></div>
      </div>
      <div id="panel">
        <div id="panel-header">
          <h1>Per-model scale calibrator</h1>
          <div class="row">
            <label>Background</label>
            <select id="background-select"></select>
          </div>
          <div class="row">
            <label>Copy from</label>
            <select id="copy-from-select"><option value="">— pick background —</option></select>
            <button id="copy-btn">Copy</button>
          </div>
          <div class="row">
            <button id="apply-all-btn" style="flex:1;">Apply current heights to ALL backgrounds &amp; save everywhere</button>
          </div>
        </div>

        <div id="big-controls">
          <div class="slider-row">
            <span style="width:90px;color:var(--text-dim);font-size:12px;">Height (m)</span>
            <input type="range" id="height-slider" min="0" max="1" step="0.001" value="0" disabled />
            <input type="number" id="height-value" step="0.01" min="0.01" max="20" value="0" disabled />
          </div>
          <div id="nav-row">
            <button id="prev-btn">&larr; Prev</button>
            <button id="reset-btn">Reset</button>
            <button id="next-btn">Next &rarr;</button>
          </div>
          <div id="rotate-row">
            <label><input type="checkbox" id="auto-rotate" checked /> auto-rotate</label>
            <input type="range" id="rotate-slider" min="0" max="360" step="1" value="0" />
          </div>
        </div>

        <div id="save-row">
          <button id="save-btn" class="primary">Save all for this background</button>
        </div>
        <div id="save-status"></div>

        <div id="list-wrap"></div>
      </div>
    </div>
    <script type="module" src="/src/calibrate.js"></script>
  </body>
</html>
